<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tonsiena.github.io</title>
    <link rel="stylesheet" href="../global.css">
</head>

<body>

    <header>

        <nav>
            <tab id="tab-main">Main</tab>
            <tab id="tab-archive">Archive</tab>

            <p class="title">

                tonsiena.github.io
                <img id="tab-menu" src="/icons/ic_menu.svg"></img>
            </p>

        </nav>
    </header>
    <page></page>

    <overlay>
        <button id="theme-toggle" aria-label="Change theme">Dark</button>
    </overlay>
    <script src="https://unpkg.com/tonweb@0.0.64/dist/tonweb.js"></script>
    <script type="module">
        import { display, cfetch, fetchAccount } from '../core.js';

        const $ = (selector, isclass = false) =>
            document.querySelector((isclass ? '.' : '#') + selector);

        const UrlParams = new URLSearchParams(window.location.search);

        const setCurrentAddress = (address) => {
            if (!address) return;
            account_address = address;
            loadCollections();
        }

        var account_address, CollectionCore = {
            limit: 1000, offset: 0, collection_address: null,
            load: async function () {
                return await cfetch("https://toncenter.com/api/v3/nft/items?owner_address=" + account_address + "&limit=" + this.limit + "&offset=" + this.offset + (this.collection_address ? "&collection_address=" + this.collection_address : ""));
            }
        };


        const createItem = (el, props, parrent) => {
            var item = Object.assign(document.createElement(el), props);
            parrent?.append(item);
            return item;
        }

        async function loadCollections() {
            var { metadata: meta } = await CollectionCore.load();
            var targetType = CollectionCore.collection_address ? "nft_items" : "nft_collections"
            var page = document.querySelector("page");
            var content = createItem("ul", { className: "content", id: "content-main" }, page);
            var archive = createItem("ul", { className: "content", id: "content-archive" })

            $("tab-archive").onclick = () => {
                if (!$("content-archive")) {
                    page.append(archive)
                    content.remove();
                }
            }
            $("tab-main").onclick = () => {
                if (!$("content-main")) {
                    page.append(content)
                    archive.remove();
                }
            }

            Object.keys(meta).forEach(address => {
                const data = meta[address].token_info[0];
                if (data.type === targetType) {
                    if (!data.valid || !data.image) {
                        var card = createItem("li", { classList: "card" }, archive);
                        var card_header = createItem("div", { className: "card-header" }, card)
                        createItem("img", { src: "../nopic.png" }, card_header)

                        createItem("p", { className: "card-header-text", textContent: data?.name ? data.name : address }, card_header)
                    } else if (data.valid) {
                        var card = createItem("li", { className: "card" }, content);


                        var card_header = createItem("div", { className: "card-header" }, card)
                        
                        var card_content = createItem("div", { className: "card-content" }, card)

                        var card_header_text = createItem("p", { className: "card-header-text", textContent: data?.name }, card_header)
                        createItem("img", {
                            onerror: function () {
                                this.onerror = null;
                                this.src = '../nopic.png';
                            },
                            src: data?.extra?._image_small || "../nopic.png"
                        }, card_header)
                        var card_header_address = createItem("a", { href: "https://tonscan.org/collection/" + new TonWeb.Address(address).toString(true, true, false, false), className: "details-sp-address", textContent: address }, card)
                        createItem("span", { className: "details-sp-dscr", textContent: data?.description }, card_header_text)

                        var card_footer = createItem("div", { className: "card-footer" }, card);
                        

                         loadDetails(address, data, card_footer)
                    }
                }
            });
        }

        const addDetails = (key, value, parent, href = value) => {
            if (value) {
                var details = createItem("p", { className: "details" }, parent)
                createItem("span", { className: "details-sp-key", textContent: key }, details)
                createItem("a", { className: "details-sp-val", href: href, target: "_blank", textContent: value }, details)
                return details;
            }
        }

        const loadDetails = (address, data, parrent) => {
            addDetails("Image", data?.image, parrent);
            addDetails("Domain", data.extra?.domain, parrent);
            addDetails("External link", data.extra?.external_link, parrent);
            addDetails("External url", data.extra?.external_url, parrent);
            addDetails("Cover image", data.extra?.cover_image, parrent);
            addDetails("Uri", data.extra?.uri, parrent);
        }
        $("tab-menu").onclick = () => document.querySelector("overlay").classList.toggle("active")


        const initTheme = () => {

            const toggleBtn = document.getElementById('theme-toggle');
            const body = document.body;

            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                body.classList.add('dark');
                toggleBtn.textContent = 'Light';
            } else {
                toggleBtn.textContent = 'Dark';
            }

            toggleBtn.addEventListener('click', () => {
                body.classList.toggle('dark');
                const isDark = body.classList.contains('dark');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                toggleBtn.textContent = isDark ? 'Light' : 'Dark';
            });
        }


        async function loadParams() {
            if (UrlParams.has('account')) {
                account_address = UrlParams.get('account');
                if (UrlParams.has('collection')) CollectionCore.collection_address = UrlParams.get('collection');
                if (UrlParams.has('offset')) CollectionCore.offset = UrlParams.get('offset');
                if (UrlParams.has('limit')) CollectionCore.limit = UrlParams.get('limit');

                const res = await fetchAccount(account_address);
                if (res.error) {
                    previewScreen();
                    return;
                }

                if (res) setCurrentAddress(res.address);
            } else previewScreen();
        }

        initTheme();

        const previewScreen = () => {
            var previewContainer = createItem("div", { className: "preview-container" }, document.querySelector("page"));

            var accountWrapper = createItem("div", { className: "preview-input-wrapper" }, previewContainer);
            createItem("label", { className: "preview-input-label", innerText: "Account" }, accountWrapper);
            var accountInput = createItem("input", { className: "preview-input-field", type: "text", placeholder: "Enter account", value: account_address || "" }, accountWrapper);

            var offsetWrapper = createItem("div", { className: "preview-input-wrapper" }, previewContainer);
            createItem("label", { className: "preview-input-label", innerText: "Offset" }, offsetWrapper);
            var offsetInput = createItem("input", { className: "preview-input-field", type: "number", placeholder: "Enter offset", value: CollectionCore.offset }, offsetWrapper);

            var limitWrapper = createItem("div", { className: "preview-input-wrapper" }, previewContainer);
            createItem("label", { className: "preview-input-label", innerText: "Limit" }, limitWrapper);
            var limitInput = createItem("input", { className: "preview-input-field", type: "number", placeholder: "Enter limit", value: CollectionCore.limit }, limitWrapper);

            var collectionWrapper = createItem("div", { className: "preview-input-wrapper" }, previewContainer);
            createItem("label", { className: "preview-input-label", innerText: "Collection" }, collectionWrapper);
            var collectionInput = createItem("input", { className: "preview-input-field", type: "text", placeholder: "Enter collection", value: CollectionCore.collectin || "" }, collectionWrapper);

            const buttonContainer = createItem("div", { className: "preview-search-container" }, previewContainer);
            createItem("button", {
                className: "preview-search-btn", innerText: "Search", onclick: () => {
                    if (accountInput.value.length != 0) {
                        var url = "https://tonsiena.github.io/collectibles/?account=" + accountInput.value;
                        if (offsetInput.value.length != 0) url += "&offset=" + offsetInput.value;
                        if (limitInput.value.length != 0) url += "&limit=" + limitInput.value;
                        if (collectionInput.value.length != 0) url += "&collection=" + collectionInput.value;
                        window.location.href = url;
                    }
                }
            }, buttonContainer);
        }


        loadParams();
    </script>
</body>

</html>
