<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Telegram Mini App</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <!-- Начальное окно -->
           <h1>Second Screen</h1>

    <div id="main-screen" class="screen">
      <h1>tonsiena</h1>
      <div class="grid">
        <div class="grid-item">Item 1</div>
        <div class="grid-item">Item 2</div>
        <div class="grid-item">Item 3</div>
        <div class="grid-item">Item 4</div>
      </div>
      <button id="go-to-second">Go to Second Screen</button>
    </div>
    <!-- Вторичное окно -->
    <div id="second-screen" class="screen" style="display: none;">
      <div class="grid">
        <div class="grid-item">Item A</div>
        <div class="grid-item">Item B</div>
        <div class="grid-item">Item C</div>
        <div class="grid-item">Item D</div>
      </div>
      <button id="go-back">Back to Main</button>
    </div>
  </div>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/eruda"></script>
  <script src="script.js"></script>
</body>
</html>
